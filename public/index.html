<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caja ORUM</title>
<style>
  :root {
    --bg: #f5f5f0;
    --white: #ffffff;
    --black: #111111;
    --gray: #6b7280;
    --gray-light: #e5e7eb;
    --gray-bg: #f9fafb;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-brd: #bbf7d0;
    --blue: #2563eb;
    --blue-bg: #eff6ff;
    --blue-brd: #bfdbfe;
    --orange: #ea580c;
    --orange-bg: #fff7ed;
    --orange-brd: #fed7aa;
    --purple: #7c3aed;
    --purple-bg: #f5f3ff;
    --purple-brd: #ddd6fe;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --red-brd: #fecaca;
    --yellow-bg: #fefce8;
    --yellow-brd: #fef08a;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
    --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--black); min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .login-card {
    background: var(--white); border-radius: 20px; padding: 40px; width: 100%; max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,.10);
  }
  .login-logo { text-align: center; margin-bottom: 28px; }
  .login-logo img { height: 48px; }
  .login-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px; }
  .login-sub { color: var(--gray); font-size: 13px; text-align: center; margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--gray); }
  .form-group input {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray-light); border-radius: 8px;
    font-size: 14px; outline: none; transition: border-color .2s;
  }
  .form-group input:focus { border-color: var(--black); }
  .btn-login {
    width: 100%; padding: 12px; background: var(--black); color: #fff; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s;
  }
  .btn-login:hover { opacity: .85; }
  .login-error { color: var(--red); font-size: 13px; text-align: center; margin-top: 12px; }

  /* ── APP ── */
  #app { display: none; }
  .topbar {
    background: var(--white); border-bottom: 1px solid var(--gray-light);
    padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .topbar-subtitle { font-size: 12px; color: var(--gray); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .user-badge {
    display: flex; align-items: center; gap: 8px; padding: 6px 12px;
    background: var(--gray-bg); border-radius: 20px; font-size: 13px; font-weight: 500;
  }
  .user-avatar {
    width: 28px; height: 28px; background: var(--black); color: #fff;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .btn-salir {
    padding: 6px 14px; border: 1.5px solid var(--gray-light); background: var(--white);
    border-radius: 8px; font-size: 13px; cursor: pointer; transition: all .2s;
  }
  .btn-salir:hover { background: var(--gray-bg); }

  /* ── TABS ── */
  .tabs {
    background: var(--white); border-bottom: 1px solid var(--gray-light);
    padding: 0 24px; display: flex; gap: 0;
  }
  .tab {
    padding: 14px 20px; font-size: 14px; font-weight: 500; color: var(--gray);
    border-bottom: 2px solid transparent; cursor: pointer; transition: all .2s;
    white-space: nowrap;
  }
  .tab.active { color: var(--black); border-bottom-color: var(--black); }
  .tab:hover:not(.active) { color: var(--black); background: var(--gray-bg); }

  /* ── MAIN CONTENT ── */
  .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  /* ── FILTROS ── */
  .filtros-bar {
    background: var(--white); border-radius: var(--radius); padding: 16px 20px;
    display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
    box-shadow: var(--shadow); flex-wrap: wrap;
  }
  .filtros-bar label { font-size: 13px; color: var(--gray); font-weight: 500; }
  .filtros-bar input[type="date"] {
    padding: 8px 12px; border: 1.5px solid var(--gray-light); border-radius: 8px;
    font-size: 14px; outline: none;
  }
  .filtros-bar input[type="date"]:focus { border-color: var(--black); }
  .btn-cargar {
    padding: 9px 20px; background: var(--black); color: #fff; border: none;
    border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 8px; transition: opacity .2s;
  }
  .btn-cargar:hover { opacity: .85; }
  .btn-cargar:disabled { opacity: .5; cursor: not-allowed; }

  /* ── KPI CARDS ── */
  .kpi-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--white); border-radius: var(--radius); padding: 20px;
    box-shadow: var(--shadow);
  }
  .kpi-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--gray); margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  .kpi-sub { font-size: 12px; color: var(--gray); margin-top: 4px; }
  .kpi-efectivo .kpi-value { color: var(--green); }
  .kpi-tpv .kpi-value { color: var(--blue); }
  .kpi-transferencia .kpi-value { color: var(--purple); }
  .kpi-total .kpi-value { color: var(--black); }

  /* ── SECCIÓN CAJAS ── */
  .cajas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 900px) { .cajas-grid { grid-template-columns: 1fr; } }

  .caja-card {
    background: var(--white); border-radius: var(--radius); padding: 20px;
    box-shadow: var(--shadow);
  }
  .caja-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  }
  .caja-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .caja-total { font-size: 22px; font-weight: 800; }
  .caja-marbella .caja-total { color: var(--purple); }
  .caja-monda .caja-total { color: var(--green); }

  .caja-desglose { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .desglose-item {
    padding: 12px; border-radius: 8px; text-align: center;
  }
  .desglose-item.efectivo { background: var(--green-bg); border: 1px solid var(--green-brd); }
  .desglose-item.tpv { background: var(--blue-bg); border: 1px solid var(--blue-brd); }
  .desglose-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--gray); }
  .desglose-value { font-size: 20px; font-weight: 700; margin-top: 2px; }
  .desglose-item.efectivo .desglose-value { color: var(--green); }
  .desglose-item.tpv .desglose-value { color: var(--blue); }
  .desglose-count { font-size: 11px; color: var(--gray); }

  /* Saldo inicial */
  .saldo-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-top: 1px solid var(--gray-light); margin-top: 8px;
  }
  .saldo-row label { font-size: 12px; color: var(--gray); font-weight: 500; flex: 1; }
  .saldo-input {
    width: 100px; padding: 6px 10px; border: 1.5px solid var(--gray-light);
    border-radius: 6px; font-size: 14px; font-weight: 600; text-align: right;
  }
  .btn-retirada {
    padding: 6px 12px; border: 1.5px solid var(--red-brd); background: var(--red-bg);
    color: var(--red); border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .efectivo-total {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-top: 1px solid var(--gray-light);
    font-weight: 700; font-size: 14px;
  }

  /* ── TABLA FACTURAS ── */
  .tabla-section { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; overflow: hidden; }
  .tabla-header {
    padding: 16px 20px; border-bottom: 1px solid var(--gray-light);
    display: flex; align-items: center; justify-content: space-between;
  }
  .tabla-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .badge {
    display: inline-flex; align-items: center; padding: 3px 10px;
    border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .badge-gray { background: var(--gray-light); color: var(--gray); }
  .badge-orange { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-brd); }

  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--gray); background: var(--gray-bg); border-bottom: 1px solid var(--gray-light); }
  td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--gray-light); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--gray-bg); }

  .importe { font-weight: 700; font-size: 14px; }
  .importe.positivo { color: var(--green); }
  .importe.negativo { color: var(--red); }

  /* ── SELECTOR MÉTODO PAGO ── */
  .metodo-selector { display: flex; gap: 4px; flex-wrap: wrap; }
  .btn-metodo {
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    cursor: pointer; border: 1.5px solid var(--gray-light); background: var(--white);
    color: var(--gray); transition: all .15s; white-space: nowrap;
  }
  .btn-metodo:hover { border-color: var(--black); color: var(--black); }
  .btn-metodo.selected-efectivo-marbella { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .btn-metodo.selected-tpv-marbella { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
  .btn-metodo.selected-efectivo-monda { background: #f0fdf4; border-color: #15803d; color: #15803d; }
  .btn-metodo.selected-tpv-monda { background: #eff6ff; border-color: #1d4ed8; color: #1d4ed8; }
  .btn-metodo.selected-transferencia { background: var(--purple-bg); border-color: var(--purple); color: var(--purple); }
  .btn-metodo.selected-factura0 { background: var(--gray-bg); border-color: var(--gray); color: var(--gray); }

  /* ── BOTONES CIERRE ── */
  .cierres-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .btn-cierre {
    padding: 11px 22px; border-radius: 10px; font-size: 14px; font-weight: 600;
    cursor: pointer; border: 1.5px solid; transition: all .2s; display: flex; align-items: center; gap: 8px;
  }
  .btn-cierre-marbella { background: var(--purple-bg); border-color: var(--purple-brd); color: var(--purple); }
  .btn-cierre-monda { background: var(--green-bg); border-color: var(--green-brd); color: var(--green); }
  .btn-cierre-noconf { background: var(--orange-bg); border-color: var(--orange-brd); color: var(--orange); }
  .btn-cierre-global { background: var(--gray-bg); border-color: var(--gray-light); color: var(--black); }

  /* ── EMPTY STATE ── */
  .empty-state { padding: 48px; text-align: center; color: var(--gray); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ── LOADING ── */
  .loading { padding: 48px; text-align: center; color: var(--gray); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--gray-light); border-top-color: var(--black); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CONTABILIDAD ── */
  .contab-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .tick-circle {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--gray-light);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all .2s; background: var(--white);
  }
  .tick-circle.checked { background: var(--green); border-color: var(--green); color: #fff; }

  /* ── MODAL CIERRE ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex;
    align-items: center; justify-content: center; z-index: 1000; padding: 20px;
  }
  .modal {
    background: var(--white); border-radius: 16px; width: 100%; max-width: 680px;
    max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2);
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--gray-light);
    display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--white);
  }
  .modal-title { font-size: 16px; font-weight: 700; }
  .btn-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray); padding: 4px; }
  .modal-body { padding: 24px; }
  .cierre-empresa { text-align: center; margin-bottom: 20px; }
  .cierre-empresa strong { font-size: 18px; font-weight: 800; }
  .cierre-empresa p { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .cierre-linea { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--gray-light); font-size: 14px; }
  .cierre-linea.total { font-weight: 700; font-size: 16px; border-bottom: none; padding-top: 12px; }
  .cierre-firma { margin-top: 24px; }
  .cierre-firma label { font-size: 12px; color: var(--gray); display: block; margin-bottom: 6px; }
  .cierre-firma input { width: 100%; padding: 10px; border: 1.5px solid var(--gray-light); border-radius: 8px; font-size: 14px; }
  .btn-imprimir {
    width: 100%; margin-top: 16px; padding: 12px; background: var(--black); color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
  }

  /* ── TRANSFERENCIAS ── */
  .kpi-transferencia-row {
    background: var(--purple-bg); border: 1px solid var(--purple-brd); border-radius: 8px;
    padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .kpi-transferencia-row span { font-size: 13px; color: var(--purple); font-weight: 600; }
  .kpi-transferencia-row strong { font-size: 18px; font-weight: 800; color: var(--purple); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="/orum-logo.png" alt="ORUM" onerror="this.style.display='none'">
      <div style="font-size:26px;font-weight:900;letter-spacing:-1px;">ORUM</div>
    </div>
    <div class="login-title">Sistema de Caja 2026</div>
    <div class="login-sub">Accede con tus credenciales</div>
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="inp-usuario" placeholder="Usuario" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="inp-pass" placeholder="Contraseña" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div>
        <div class="topbar-logo">ORUM Rent & Events</div>
        <div class="topbar-subtitle">Sistema de Caja 2026</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">S</div>
        <span id="user-nombre">Usuario</span>
      </div>
      <button class="btn-salir" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('caja')" id="tab-caja">🏦 Caja Diaria</div>
    <div class="tab" onclick="showTab('contabilidad')" id="tab-contabilidad" style="display:none">📊 Contabilidad</div>
  </div>

  <!-- CAJA DIARIA -->
  <div id="panel-caja" class="main">
    <div class="filtros-bar">
      <label>Desde</label>
      <input type="date" id="fecha-desde" onchange="guardarFiltros()">
      <label>Hasta</label>
      <input type="date" id="fecha-hasta" onchange="guardarFiltros()">
      <button class="btn-cargar" onclick="cargarCobros()" id="btn-cargar">
        <span>↻</span> Cargar cobros
      </button>
    </div>

    <div id="caja-content">
      <div class="empty-state">
        <div class="icon">📅</div>
        <p>Selecciona un rango de fechas y pulsa "Cargar cobros"</p>
      </div>
    </div>
  </div>

  <!-- CONTABILIDAD -->
  <div id="panel-contabilidad" class="main" style="display:none">
    <div class="contab-header">
      <label>Desde</label>
      <input type="date" id="contab-desde" class="filtros-bar" style="padding:8px 12px;border:1.5px solid var(--gray-light);border-radius:8px;">
      <label>Hasta</label>
      <input type="date" id="contab-hasta" class="filtros-bar" style="padding:8px 12px;border:1.5px solid var(--gray-light);border-radius:8px;">
      <button class="btn-cargar" onclick="cargarContabilidad()">↻ Cargar</button>
    </div>
    <div id="contab-content">
      <div class="empty-state"><div class="icon">📊</div><p>Selecciona un rango y carga los datos</p></div>
    </div>
  </div>
</div>

<!-- MODAL CIERRE -->
<div id="modal-cierre" style="display:none" class="modal-overlay" onclick="if(event.target===this)cerrarModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Cierre de Caja</div>
      <button class="btn-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const API_WORKER = 'https://orum-api.dashboardorum.workers.dev';
const API_SERVER = '';

// Métodos de pago disponibles
const METODOS = [
  { id: 'efectivo-marbella', label: '💵 Ef. Marbella', ubicacion: 'marbella', tipo: 'efectivo', nombre: 'Efectivo Marbella' },
  { id: 'tpv-marbella',      label: '💳 TPV Marbella', ubicacion: 'marbella', tipo: 'tpv',      nombre: 'TPV Marbella' },
  { id: 'efectivo-monda',    label: '💵 Ef. Monda',    ubicacion: 'monda',    tipo: 'efectivo', nombre: 'Efectivo Monda' },
  { id: 'tpv-monda',         label: '💳 TPV Monda',    ubicacion: 'monda',    tipo: 'tpv',      nombre: 'TPV Monda' },
  { id: 'transferencia',     label: '🏦 Transf.',      ubicacion: null,       tipo: 'transferencia', nombre: 'Transferencia Bancaria' },
  { id: 'factura0',          label: '📄 Factura 0€',   ubicacion: null,       tipo: 'otro',     nombre: 'Factura 0€' },
];

let estadoActual = {}; // factura_id -> metodo
let facturasActuales = [];
let noConfirmadosActuales = [];
let registrosGuardados = {};
let userInfo = null;

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin() {
  const usuario = document.getElementById('inp-usuario').value.trim();
  const password = document.getElementById('inp-pass').value;
  const r = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({usuario,password}) });
  const d = await r.json();
  if (!r.ok) { document.getElementById('login-error').textContent = d.error || 'Error'; return; }
  userInfo = d;
  iniciarApp();
}

document.getElementById('inp-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  location.reload();
}

async function checkSession() {
  const r = await fetch('/api/me');
  if (!r.ok) return;
  userInfo = await r.json();
  iniciarApp();
}

function iniciarApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-nombre').textContent = userInfo.nombre;
  document.getElementById('user-avatar').textContent = userInfo.nombre[0].toUpperCase();

  // Mostrar tabs según rol
  if (['contabilidad','admin'].includes(userInfo.rol)) {
    document.getElementById('tab-contabilidad').style.display = '';
  }

  // Fechas por defecto: mes actual
  const hoy = new Date();
  const primerDia = new Date(hoy.getFullYear(), hoy.getMonth(), 1).toISOString().substring(0,10);
  const hoyStr = hoy.toISOString().substring(0,10);
  
  const savedDesde = localStorage.getItem('caja-desde') || primerDia;
  const savedHasta = localStorage.getItem('caja-hasta') || hoyStr;
  document.getElementById('fecha-desde').value = savedDesde;
  document.getElementById('fecha-hasta').value = savedHasta;

  const hoyContab = hoy.toISOString().substring(0,10);
  document.getElementById('contab-desde').value = primerDia;
  document.getElementById('contab-hasta').value = hoyContab;
}

function guardarFiltros() {
  localStorage.setItem('caja-desde', document.getElementById('fecha-desde').value);
  localStorage.setItem('caja-hasta', document.getElementById('fecha-hasta').value);
}

function showTab(tab) {
  ['caja','contabilidad'].forEach(t => {
    document.getElementById('panel-' + t).style.display = t === tab ? '' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
}

// ── CARGAR COBROS ─────────────────────────────────────────────
async function cargarCobros() {
  const desde = document.getElementById('fecha-desde').value;
  const hasta = document.getElementById('fecha-hasta').value;
  if (!desde || !hasta) return;

  const btn = document.getElementById('btn-cargar');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;display:inline-block;margin:0"></span> Cargando...';

  document.getElementById('caja-content').innerHTML = '<div class="loading"><div class="spinner"></div><p>Cargando facturas de Rentman...</p></div>';

  try {
    // Cargar facturas del worker y contactos en paralelo
    const [rFacturas, rRegistros, rContactos] = await Promise.all([
      fetch(`${API_WORKER}/caja/facturas?desde=${desde}&hasta=${hasta}`).then(r=>r.json()),
      fetch(`/api/caja/registros?desde=${desde}&hasta=${hasta}`).then(r=>r.json()),
      fetch(`${API_WORKER}/contactos`).then(r=>r.json())
    ]);

    // Mapa de contactos id -> nombre
    const mapaContactos = {};
    (rContactos.data || []).forEach(c => { mapaContactos[String(c.id)] = c.displayname || ''; });

    // Enriquecer nombres
    const enrichNames = (arr) => arr.map(f => ({
      ...f,
      cliente: (f.cliente_id && mapaContactos[f.cliente_id]) ? mapaContactos[f.cliente_id] : (f.cliente || '—')
    }));

    facturasActuales = enrichNames(rFacturas.facturas || []);
    noConfirmadosActuales = enrichNames(rFacturas.no_confirmados || []);
    registrosGuardados = rRegistros || {};

    // Aplicar registros guardados
    estadoActual = {};
    Object.entries(registrosGuardados).forEach(([id, reg]) => {
      estadoActual[id] = reg.metodo_pago;
    });

    renderCaja();
  } catch(e) {
    document.getElementById('caja-content').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error al cargar: ${e.message}</p></div>`;
  }

  btn.disabled = false;
  btn.innerHTML = '<span>↻</span> Cargar cobros';
}

// ── RENDER CAJA ───────────────────────────────────────────────
function renderCaja() {
  const desde = document.getElementById('fecha-desde').value;
  const hasta = document.getElementById('fecha-hasta').value;

  // Calcular totales
  const totales = { marbella: {efectivo:0,tpv:0,count_ef:0,count_tpv:0}, monda: {efectivo:0,tpv:0,count_ef:0,count_tpv:0}, transferencia: 0 };

  facturasActuales.forEach(f => {
    const metodoId = estadoActual[String(f.id)];
    if (!metodoId) return;
    const m = METODOS.find(x => x.id === metodoId);
    if (!m) return;
    const imp = f.total_pagado || f.importe || 0;
    if (m.ubicacion === 'marbella') {
      totales.marbella[m.tipo] += imp;
      if (m.tipo === 'efectivo') totales.marbella.count_ef++;
      else totales.marbella.count_tpv++;
    } else if (m.ubicacion === 'monda') {
      totales.monda[m.tipo] += imp;
      if (m.tipo === 'efectivo') totales.monda.count_ef++;
      else totales.monda.count_tpv++;
    } else if (m.tipo === 'transferencia') {
      totales.transferencia += imp;
    }
  });

  const totalMarbella = totales.marbella.efectivo + totales.marbella.tpv;
  const totalMonda = totales.monda.efectivo + totales.monda.tpv;
  const totalGlobal = totalMarbella + totalMonda + totales.transferencia;
  const sinAsignar = facturasActuales.filter(f => !estadoActual[String(f.id)]).length;

  const html = `
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card kpi-total">
        <div class="kpi-label">Total Cobrado</div>
        <div class="kpi-value">${fmt(totalGlobal)}</div>
        <div class="kpi-sub">${facturasActuales.length} facturas · ${sinAsignar} sin asignar</div>
      </div>
      <div class="kpi-card kpi-efectivo">
        <div class="kpi-label">Efectivo Total</div>
        <div class="kpi-value">${fmt(totales.marbella.efectivo + totales.monda.efectivo)}</div>
        <div class="kpi-sub">Marbella + Monda</div>
      </div>
      <div class="kpi-card kpi-tpv">
        <div class="kpi-label">TPV Total</div>
        <div class="kpi-value">${fmt(totales.marbella.tpv + totales.monda.tpv)}</div>
        <div class="kpi-sub">Marbella + Monda</div>
      </div>
      <div class="kpi-card kpi-transferencia">
        <div class="kpi-label">Transferencias</div>
        <div class="kpi-value">${fmt(totales.transferencia)}</div>
        <div class="kpi-sub">Bancarias</div>
      </div>
    </div>

    <!-- CAJAS -->
    <div class="cajas-grid">
      <div class="caja-card caja-marbella">
        <div class="caja-header">
          <div class="caja-title">🏙️ Caja Marbella</div>
          <div class="caja-total">${fmt(totalMarbella)}</div>
        </div>
        <div class="caja-desglose">
          <div class="desglose-item efectivo">
            <div class="desglose-label">💵 Efectivo</div>
            <div class="desglose-value">${fmt(totales.marbella.efectivo)}</div>
            <div class="desglose-count">${totales.marbella.count_ef} cobros</div>
          </div>
          <div class="desglose-item tpv">
            <div class="desglose-label">💳 TPV</div>
            <div class="desglose-value">${fmt(totales.marbella.tpv)}</div>
            <div class="desglose-count">${totales.marbella.count_tpv} cobros</div>
          </div>
        </div>
        <div class="saldo-row">
          <label>Saldo inicial €</label>
          <input type="number" class="saldo-input" id="saldo-marbella" value="0" min="0">
          <button class="btn-retirada" onclick="registrarRetirada('marbella')">- Retirada</button>
        </div>
        <div class="efectivo-total">
          <span>EFECTIVO EN CAJA</span>
          <span id="ef-caja-marbella">${fmt(totales.marbella.efectivo)}</span>
        </div>
      </div>

      <div class="caja-card caja-monda">
        <div class="caja-header">
          <div class="caja-title">🏡 Caja Monda</div>
          <div class="caja-total">${fmt(totalMonda)}</div>
        </div>
        <div class="caja-desglose">
          <div class="desglose-item efectivo">
            <div class="desglose-label">💵 Efectivo</div>
            <div class="desglose-value">${fmt(totales.monda.efectivo)}</div>
            <div class="desglose-count">${totales.monda.count_ef} cobros</div>
          </div>
          <div class="desglose-item tpv">
            <div class="desglose-label">💳 TPV</div>
            <div class="desglose-value">${fmt(totales.monda.tpv)}</div>
            <div class="desglose-count">${totales.monda.count_tpv} cobros</div>
          </div>
        </div>
        <div class="saldo-row">
          <label>Saldo inicial €</label>
          <input type="number" class="saldo-input" id="saldo-monda" value="0" min="0">
          <button class="btn-retirada" onclick="registrarRetirada('monda')">- Retirada</button>
        </div>
        <div class="efectivo-total">
          <span>EFECTIVO EN CAJA</span>
          <span id="ef-caja-monda">${fmt(totales.monda.efectivo)}</span>
        </div>
      </div>
    </div>

    <!-- BOTONES CIERRE -->
    <div class="cierres-row">
      <button class="btn-cierre btn-cierre-marbella" onclick="generarCierre('marbella')">🟣 Cierre Marbella</button>
      <button class="btn-cierre btn-cierre-monda" onclick="generarCierre('monda')">🟢 Cierre Monda</button>
      <button class="btn-cierre btn-cierre-noconf" onclick="generarCierre('noconfirmados')">📋 No Confirmados</button>
      <button class="btn-cierre btn-cierre-global" onclick="generarCierre('global')">📋 Cierre Global</button>
    </div>

    <!-- TABLA FACTURAS OFICIALES -->
    <div class="tabla-section">
      <div class="tabla-header">
        <div class="tabla-title">
          🧾 Facturas Oficiales
          <span class="badge badge-gray">${facturasActuales.length}</span>
          ${sinAsignar > 0 ? `<span class="badge badge-orange">${sinAsignar} sin asignar</span>` : ''}
        </div>
      </div>
      ${facturasActuales.length === 0
        ? '<div class="empty-state"><div class="icon">📄</div><p>No hay facturas pagadas en este período</p></div>'
        : `<table>
          <thead><tr>
            <th>Nº Factura</th><th>Cliente</th><th>Proyecto</th>
            <th>Fecha Pago</th><th>Importe</th><th>Método de Pago</th>
          </tr></thead>
          <tbody>
            ${facturasActuales.map(f => renderFilaFactura(f, false)).join('')}
          </tbody>
        </table>`
      }
    </div>

    <!-- TABLA NO CONFIRMADOS -->
    ${noConfirmadosActuales.length > 0 ? `
    <div class="tabla-section">
      <div class="tabla-header">
        <div class="tabla-title">
          🍾 No Confirmados (Abrebotellas)
          <span class="badge badge-orange">${noConfirmadosActuales.length}</span>
        </div>
      </div>
      <table>
        <thead><tr>
          <th>Nº Factura</th><th>Cliente</th><th>Proyecto</th>
          <th>Fecha Pago</th><th>Importe Base (sin IVA)</th><th>Método de Pago</th>
        </tr></thead>
        <tbody>
          ${noConfirmadosActuales.map(f => renderFilaFactura(f, true)).join('')}
        </tbody>
      </table>
    </div>` : ''}
  `;

  document.getElementById('caja-content').innerHTML = html;

  // Actualizar efectivo en caja con saldo inicial
  actualizarEfectivoCaja('marbella', totales.marbella.efectivo);
  actualizarEfectivoCaja('monda', totales.monda.efectivo);
}

function renderFilaFactura(f, esNoConf) {
  const metodoId = estadoActual[String(f.id)] || '';
  const m = METODOS.find(x => x.id === metodoId);
  const imp = f.total_pagado || f.importe || 0;
  const impStr = imp >= 0
    ? `<span class="importe positivo">${fmt(imp)}</span>`
    : `<span class="importe negativo">${fmt(imp)}</span>`;

  const botonesMetodo = METODOS.map(met => `
    <button class="btn-metodo ${metodoId === met.id ? 'selected-' + met.id : ''}"
      onclick="asignarMetodo(${f.id}, '${met.id}', ${esNoConf})">
      ${met.label}
    </button>
  `).join('');

  return `<tr id="fila-${f.id}">
    <td><strong>${f.numero || f.id}</strong></td>
    <td>${f.cliente || '—'}</td>
    <td style="color:var(--gray);font-size:12px">${f.proyecto_numero ? '#' + f.proyecto_numero : '—'}</td>
    <td style="color:var(--gray)">${f.fecha_pago || '—'}</td>
    <td>${impStr}</td>
    <td><div class="metodo-selector">${botonesMetodo}</div></td>
  </tr>`;
}

async function asignarMetodo(facturaId, metodoId, esNoConf) {
  const key = String(facturaId);
  const anterior = estadoActual[key];

  // Toggle: si ya estaba seleccionado, quitar
  if (anterior === metodoId) {
    delete estadoActual[key];
    await fetch('/api/caja/registro', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ factura_id: facturaId, metodo_pago: null })
    });
  } else {
    estadoActual[key] = metodoId;
    const m = METODOS.find(x => x.id === metodoId);
    const f = [...facturasActuales, ...noConfirmadosActuales].find(x => x.id === facturaId);
    await fetch('/api/caja/registro', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        factura_id: facturaId,
        metodo_pago: metodoId,
        ubicacion: m?.ubicacion,
        tipo: m?.tipo,
        importe: f?.total_pagado || f?.importe || 0,
        cliente: f?.cliente || '',
        numero: f?.numero || '',
        fecha_pago: f?.fecha_pago || '',
        es_abrebotellas: esNoConf,
        usuario: userInfo?.nombre || ''
      })
    });
  }

  renderCaja();
}

function actualizarEfectivoCaja(caja, efectivo) {
  const saldoEl = document.getElementById('saldo-' + caja);
  const efEl = document.getElementById('ef-caja-' + caja);
  if (!saldoEl || !efEl) return;
  const saldo = parseFloat(saldoEl.value) || 0;
  efEl.textContent = fmt(efectivo + saldo);
  saldoEl.oninput = () => {
    const s = parseFloat(saldoEl.value) || 0;
    efEl.textContent = fmt(efectivo + s);
  };
}

function registrarRetirada(caja) {
  const imp = prompt(`Importe de retirada en ${caja === 'marbella' ? 'Marbella' : 'Monda'} (€):`);
  if (!imp || isNaN(parseFloat(imp))) return;
  alert(`Retirada de ${fmt(parseFloat(imp))} registrada en Caja ${caja === 'marbella' ? 'Marbella' : 'Monda'}`);
}

// ── CIERRE ────────────────────────────────────────────────────
function generarCierre(tipo) {
  const desde = document.getElementById('fecha-desde').value;
  const hasta = document.getElementById('fecha-hasta').value;

  let titulo, facturasCierre, totalEfectivo = 0, totalTPV = 0, totalTransf = 0;

  if (tipo === 'marbella') {
    titulo = '🟣 Cierre Caja Marbella';
    facturasCierre = facturasActuales.filter(f => {
      const m = METODOS.find(x => x.id === estadoActual[String(f.id)]);
      return m?.ubicacion === 'marbella';
    });
  } else if (tipo === 'monda') {
    titulo = '🟢 Cierre Caja Monda';
    facturasCierre = facturasActuales.filter(f => {
      const m = METODOS.find(x => x.id === estadoActual[String(f.id)]);
      return m?.ubicacion === 'monda';
    });
  } else if (tipo === 'noconfirmados') {
    titulo = '🍾 No Confirmados';
    facturasCierre = noConfirmadosActuales.filter(f => estadoActual[String(f.id)]);
  } else {
    titulo = '📋 Cierre Global';
    facturasCierre = facturasActuales.filter(f => estadoActual[String(f.id)]);
  }

  facturasCierre.forEach(f => {
    const metodoId = estadoActual[String(f.id)];
    const m = METODOS.find(x => x.id === metodoId);
    const imp = f.total_pagado || f.importe || 0;
    if (m?.tipo === 'efectivo') totalEfectivo += imp;
    else if (m?.tipo === 'tpv') totalTPV += imp;
    else if (m?.tipo === 'transferencia') totalTransf += imp;
  });

  const total = totalEfectivo + totalTPV + totalTransf;

  const body = `
    <div class="cierre-empresa">
      <strong>ORUM Rent & Events</strong>
      <p>Servicios y Alquiler para Eventos SL</p>
      <p style="margin-top:8px;color:var(--gray)">${desde} al ${hasta}</p>
    </div>
    <div class="cierre-linea"><span>💵 Efectivo</span><strong>${fmt(totalEfectivo)}</strong></div>
    <div class="cierre-linea"><span>💳 TPV</span><strong>${fmt(totalTPV)}</strong></div>
    ${totalTransf > 0 ? `<div class="cierre-linea"><span>🏦 Transferencias</span><strong>${fmt(totalTransf)}</strong></div>` : ''}
    <div class="cierre-linea total"><span>TOTAL</span><strong>${fmt(total)}</strong></div>
    <div style="margin-top:16px">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:var(--gray-bg)">
          <th style="padding:6px 10px;text-align:left">Factura</th>
          <th style="padding:6px 10px;text-align:left">Cliente</th>
          <th style="padding:6px 10px;text-align:right">Importe</th>
          <th style="padding:6px 10px;text-align:left">Método</th>
        </tr></thead>
        <tbody>
          ${facturasCierre.map(f => {
            const metodoId = estadoActual[String(f.id)];
            const m = METODOS.find(x => x.id === metodoId);
            const imp = f.total_pagado || f.importe || 0;
            return `<tr style="border-bottom:1px solid var(--gray-light)">
              <td style="padding:6px 10px">${f.numero || f.id}</td>
              <td style="padding:6px 10px">${f.cliente || '—'}</td>
              <td style="padding:6px 10px;text-align:right;font-weight:600">${fmt(imp)}</td>
              <td style="padding:6px 10px;color:var(--gray)">${m?.nombre || '—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="cierre-firma">
      <label>Responsable de cierre</label>
      <input type="text" id="firma-nombre" placeholder="Nombre y apellidos" value="${userInfo?.nombre || ''}">
    </div>
    <button class="btn-imprimir" onclick="imprimirCierre('${titulo}')">🖨️ Imprimir / Guardar PDF</button>
  `;

  document.getElementById('modal-title').textContent = titulo;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-cierre').style.display = 'flex';
}

function cerrarModal() { document.getElementById('modal-cierre').style.display = 'none'; }

function imprimirCierre(titulo) {
  const firma = document.getElementById('firma-nombre')?.value || '';
  const contenido = document.getElementById('modal-body').innerHTML;
  const win = window.open('', '_blank');
  win.document.write(`<html><head><title>${titulo}</title>
    <style>body{font-family:sans-serif;padding:32px;max-width:600px;margin:0 auto}
    table{width:100%;border-collapse:collapse}th,td{padding:6px 10px;border-bottom:1px solid #eee}
    .btn-imprimir{display:none}.cierre-firma input{border:none;border-bottom:1px solid #333;width:100%;font-size:14px}
    @media print{.btn-imprimir{display:none}}</style></head>
    <body><h2>${titulo}</h2>${contenido}
    <p style="margin-top:24px;font-size:12px;color:#666">Firmado por: ${firma} · ${new Date().toLocaleString('es-ES')}</p>
    <script>window.onload=()=>window.print()<\/script></body></html>`);
  win.document.close();
}

// ── CONTABILIDAD ──────────────────────────────────────────────
async function cargarContabilidad() {
  const desde = document.getElementById('contab-desde').value;
  const hasta = document.getElementById('contab-hasta').value;
  if (!desde || !hasta) return;

  document.getElementById('contab-content').innerHTML = '<div class="loading"><div class="spinner"></div><p>Cargando...</p></div>';

  try {
    const [rFacturas, rRegistros, rTicks] = await Promise.all([
      fetch(`${API_WORKER}/caja/facturas?desde=${desde}&hasta=${hasta}`).then(r=>r.json()),
      fetch(`/api/caja/registros?desde=${desde}&hasta=${hasta}`).then(r=>r.json()),
      fetch(`/api/ticks?desde=${desde}&hasta=${hasta}`).then(r=>r.json())
    ]);

    const facturas = [...(rFacturas.facturas || []), ...(rFacturas.no_confirmados || [])];
    const registros = rRegistros || {};
    const ticks = rTicks || {};

    const html = `
      <div class="tabla-section">
        <div class="tabla-header">
          <div class="tabla-title">📊 Facturas Efectivo — Contabilidad</div>
        </div>
        ${facturas.length === 0
          ? '<div class="empty-state"><p>No hay facturas en este período</p></div>'
          : `<table>
            <thead><tr>
              <th>Nº Factura</th><th>Cliente</th><th>Fecha Pago</th>
              <th>Importe</th><th>Método</th><th>No Conf.</th><th>Verificado</th>
            </tr></thead>
            <tbody>
              ${facturas.map(f => {
                const reg = registros[String(f.id)];
                const tick = ticks[`${f.fecha_pago}_${f.id}`];
                const m = reg ? METODOS.find(x => x.id === reg.metodo_pago) : null;
                const imp = f.total_pagado || f.importe || 0;
                return `<tr>
                  <td><strong>${f.numero || f.id}</strong></td>
                  <td>${f.cliente || '—'}</td>
                  <td style="color:var(--gray)">${f.fecha_pago || '—'}</td>
                  <td><strong>${fmt(imp)}</strong></td>
                  <td style="color:var(--gray);font-size:12px">${m?.nombre || (reg?.metodo_pago || '—')}</td>
                  <td style="text-align:center">${f.es_abrebotellas ? '🍾' : ''}</td>
                  <td style="text-align:center">
                    <div class="tick-circle ${tick ? 'checked' : ''}"
                      onclick="toggleTick('${f.fecha_pago}_${f.id}', this)">
                      ${tick ? '✓' : ''}
                    </div>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`
        }
      </div>
    `;
    document.getElementById('contab-content').innerHTML = html;
  } catch(e) {
    document.getElementById('contab-content').innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
  }
}

async function toggleTick(key, el) {
  const estaChecked = el.classList.contains('checked');
  const r = await fetch('/api/tick', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ key, valor: estaChecked ? null : true, usuario: userInfo?.nombre || '' })
  });
  if (r.ok) {
    el.classList.toggle('checked');
    el.textContent = el.classList.contains('checked') ? '✓' : '';
  }
}

// ── UTILS ─────────────────────────────────────────────────────
function fmt(n) {
  return (parseFloat(n) || 0).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

// ── INIT ──────────────────────────────────────────────────────
checkSession();
