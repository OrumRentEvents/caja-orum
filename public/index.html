<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caja ORUM</title>
<style>
  :root {
    --bg:#f5f5f0;--white:#fff;--black:#111;--gray:#6b7280;--gray-light:#e5e7eb;--gray-bg:#f9fafb;
    --green:#16a34a;--green-bg:#f0fdf4;--green-brd:#bbf7d0;
    --blue:#2563eb;--blue-bg:#eff6ff;--blue-brd:#bfdbfe;
    --orange:#ea580c;--orange-bg:#fff7ed;--orange-brd:#fed7aa;
    --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-brd:#ddd6fe;
    --red:#dc2626;--red-bg:#fef2f2;--red-brd:#fecaca;
    --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--black);min-height:100vh}

  /* LOGIN */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{background:var(--white);border-radius:20px;padding:40px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
  .login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
  .login-sub{color:var(--gray);font-size:13px;text-align:center;margin-bottom:28px}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--gray)}
  .form-group input{width:100%;padding:11px 14px;border:1.5px solid var(--gray-light);border-radius:8px;font-size:14px;outline:none;transition:border-color .2s}
  .form-group input:focus{border-color:var(--black)}
  .btn-login{width:100%;padding:12px;background:var(--black);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
  .login-error{color:var(--red);font-size:13px;text-align:center;margin-top:12px}

  /* APP */
  #app{display:none}
  .topbar{background:var(--white);border-bottom:1px solid var(--gray-light);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
  .topbar-logo{font-size:18px;font-weight:800;letter-spacing:-.5px}
  .topbar-subtitle{font-size:12px;color:var(--gray)}
  .user-badge{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--gray-bg);border-radius:20px;font-size:13px;font-weight:500}
  .user-avatar{width:28px;height:28px;background:var(--black);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .btn-salir{padding:6px 14px;border:1.5px solid var(--gray-light);background:var(--white);border-radius:8px;font-size:13px;cursor:pointer}

  .tabs{background:var(--white);border-bottom:1px solid var(--gray-light);padding:0 24px;display:flex}
  .tab{padding:14px 20px;font-size:14px;font-weight:500;color:var(--gray);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s}
  .tab.active{color:var(--black);border-bottom-color:var(--black)}

  .main{padding:24px;max-width:1500px;margin:0 auto}

  /* FILTROS */
  .filtros-bar{background:var(--white);border-radius:var(--radius);padding:14px 20px;display:flex;align-items:center;gap:12px;margin-bottom:20px;box-shadow:var(--shadow);flex-wrap:wrap}
  .filtros-bar label{font-size:13px;color:var(--gray);font-weight:500}
  .filtros-bar input[type="date"]{padding:8px 12px;border:1.5px solid var(--gray-light);border-radius:8px;font-size:14px;outline:none}
  .filtros-bar input[type="date"]:focus{border-color:var(--black)}
  .inp-buscar{padding:8px 12px;border:1.5px solid var(--gray-light);border-radius:8px;font-size:14px;outline:none;width:220px}
  .inp-buscar:focus{border-color:var(--black)}
  .btn-cargar{padding:9px 20px;background:var(--black);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
  .btn-cargar:disabled{opacity:.5;cursor:not-allowed}

  /* KPIs */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
  .kpi-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
  .kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);margin-bottom:8px}
  .kpi-value{font-size:26px;font-weight:800;letter-spacing:-1px}
  .kpi-sub{font-size:12px;color:var(--gray);margin-top:4px}
  .kpi-efectivo .kpi-value{color:var(--green)}
  .kpi-tpv .kpi-value{color:var(--blue)}
  .kpi-transferencia .kpi-value{color:var(--purple)}

  /* CAJAS */
  .cajas-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
  @media(max-width:900px){.cajas-grid{grid-template-columns:1fr}}
  .caja-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
  .caja-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .caja-title{font-size:16px;font-weight:700}
  .caja-total{font-size:22px;font-weight:800}
  .caja-marbella .caja-total{color:var(--purple)}
  .caja-monda .caja-total{color:var(--green)}
  .caja-desglose{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .desglose-item{padding:12px;border-radius:8px;text-align:center}
  .desglose-item.efectivo{background:var(--green-bg);border:1px solid var(--green-brd)}
  .desglose-item.tpv{background:var(--blue-bg);border:1px solid var(--blue-brd)}
  .desglose-label{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--gray)}
  .desglose-value{font-size:20px;font-weight:700;margin-top:2px}
  .desglose-item.efectivo .desglose-value{color:var(--green)}
  .desglose-item.tpv .desglose-value{color:var(--blue)}
  .desglose-count{font-size:11px;color:var(--gray)}
  .saldo-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--gray-light);margin-top:6px}
  .saldo-row label{font-size:12px;color:var(--gray);font-weight:500;flex:1}
  .saldo-input{width:100px;padding:6px 10px;border:1.5px solid var(--gray-light);border-radius:6px;font-size:14px;font-weight:600;text-align:right}
  .btn-retirada{padding:6px 12px;border:1.5px solid var(--red-brd);background:var(--red-bg);color:var(--red);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
  .efectivo-total{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--gray-light);font-weight:700;font-size:14px}

  /* TABLA */
  .tabla-section{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
  .tabla-header{padding:14px 20px;border-bottom:1px solid var(--gray-light);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .tabla-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .badge-gray{background:var(--gray-light);color:var(--gray)}
  .badge-orange{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-brd)}

  .tabla-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:900px}
  th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;color:var(--gray);background:var(--gray-bg);border-bottom:1px solid var(--gray-light);white-space:nowrap;cursor:pointer;user-select:none}
  th:hover{color:var(--black)}
  th .sort-icon{margin-left:4px;opacity:.4}
  th.sorted .sort-icon{opacity:1}
  td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--gray-light);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--gray-bg)}
  .importe{font-weight:700;font-size:14px}
  .importe.pos{color:var(--green)}
  .importe.neg{color:var(--red)}
  .cliente-nombre{font-weight:600}
  .proyecto-num{color:var(--gray);font-size:12px}
  .comercial-tag{font-size:11px;color:var(--purple);background:var(--purple-bg);padding:2px 7px;border-radius:10px;font-weight:500}

  /* MÉTODOS PAGO */
  .metodo-selector{display:flex;gap:3px;flex-wrap:wrap}
  .btn-metodo{padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-light);background:var(--white);color:var(--gray);transition:all .15s;white-space:nowrap}
  .btn-metodo:hover{border-color:var(--black);color:var(--black)}
  .btn-metodo.sel-efectivo-marbella{background:var(--green-bg);border-color:var(--green);color:var(--green)}
  .btn-metodo.sel-tpv-marbella{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
  .btn-metodo.sel-efectivo-monda{background:#f0fdf4;border-color:#15803d;color:#15803d}
  .btn-metodo.sel-tpv-monda{background:#eff6ff;border-color:#1d4ed8;color:#1d4ed8}
  .btn-metodo.sel-transferencia{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}
  .btn-metodo.sel-factura0{background:var(--gray-bg);border-color:var(--gray);color:var(--gray)}

  /* CIERRES */
  .cierres-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
  .btn-cierre{padding:11px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid;display:flex;align-items:center;gap:8px;transition:all .2s}
  .btn-cierre-marbella{background:var(--purple-bg);border-color:var(--purple-brd);color:var(--purple)}
  .btn-cierre-monda{background:var(--green-bg);border-color:var(--green-brd);color:var(--green)}
  .btn-cierre-noconf{background:var(--orange-bg);border-color:var(--orange-brd);color:var(--orange)}
  .btn-cierre-global{background:var(--gray-bg);border-color:var(--gray-light);color:var(--black)}

  /* EMPTY / LOADING */
  .empty-state{padding:48px;text-align:center;color:var(--gray)}
  .empty-state .icon{font-size:40px;margin-bottom:12px}
  .loading{padding:48px;text-align:center;color:var(--gray)}
  .spinner{width:32px;height:32px;border:3px solid var(--gray-light);border-top-color:var(--black);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
  .modal{background:var(--white);border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal-header{padding:20px 24px;border-bottom:1px solid var(--gray-light);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1}
  .modal-title{font-size:16px;font-weight:700}
  .btn-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray);padding:4px}
  .modal-body{padding:24px}
  .cierre-empresa{text-align:center;margin-bottom:20px}
  .cierre-empresa strong{font-size:18px;font-weight:800}
  .cierre-linea{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray-light);font-size:14px}
  .cierre-linea.total{font-weight:700;font-size:16px;border-bottom:none;padding-top:12px}
  .cierre-firma{margin-top:24px}
  .cierre-firma label{font-size:12px;color:var(--gray);display:block;margin-bottom:6px}
  .cierre-firma input{width:100%;padding:10px;border:1.5px solid var(--gray-light);border-radius:8px;font-size:14px}
  .btn-imprimir{width:100%;margin-top:16px;padding:12px;background:var(--black);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}

  /* CONTABILIDAD */
  .tick-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--gray-light);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;background:var(--white)}
  .tick-circle.checked{background:var(--green);border-color:var(--green);color:#fff}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:24px;font-size:28px;font-weight:900;letter-spacing:-1px">ORUM</div>
    <div class="login-title">Sistema de Caja 2026</div>
    <div class="login-sub">Accede con tus credenciales</div>
    <div class="form-group"><label>Usuario</label><input type="text" id="inp-usuario" placeholder="Usuario"></div>
    <div class="form-group"><label>Contraseña</label><input type="password" id="inp-pass" placeholder="Contraseña"></div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div>
      <div class="topbar-logo">ORUM Rent & Events</div>
      <div class="topbar-subtitle">Sistema de Caja 2026</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">S</div>
        <span id="user-nombre">Usuario</span>
      </div>
      <button class="btn-salir" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('caja')" id="tab-caja">🏦 Caja Diaria</div>
    <div class="tab" onclick="showTab('contabilidad')" id="tab-contabilidad" style="display:none">📊 Contabilidad</div>
  </div>

  <!-- CAJA -->
  <div id="panel-caja" class="main">
    <div class="filtros-bar">
      <label>Desde</label>
      <input type="date" id="fecha-desde" onchange="guardarFiltros()">
      <label>Hasta</label>
      <input type="date" id="fecha-hasta" onchange="guardarFiltros()">
      <button class="btn-cargar" onclick="cargarCobros()" id="btn-cargar">↻ Cargar cobros</button>
      <input type="text" class="inp-buscar" id="buscador" placeholder="🔍 Buscar cliente, factura..." oninput="filtrarTabla()" style="display:none">
    </div>
    <div id="caja-content">
      <div class="empty-state"><div class="icon">📅</div><p>Selecciona fechas y pulsa "Cargar cobros"</p></div>
    </div>
  </div>

  <!-- CONTABILIDAD -->
  <div id="panel-contabilidad" class="main" style="display:none">
    <div class="filtros-bar">
      <label>Desde</label><input type="date" id="contab-desde">
      <label>Hasta</label><input type="date" id="contab-hasta">
      <button class="btn-cargar" onclick="cargarContabilidad()">↻ Cargar</button>
    </div>
    <div id="contab-content"><div class="empty-state"><div class="icon">📊</div><p>Selecciona rango y carga</p></div></div>
  </div>
</div>

<!-- MODAL CIERRE -->
<div id="modal-cierre" style="display:none" class="modal-overlay" onclick="if(event.target===this)cerrarModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Cierre</div>
      <button class="btn-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const API_WORKER = 'https://orum-api.dashboardorum.workers.dev';

const METODOS = [
  { id:'efectivo-marbella', label:'💵 Ef. Marbella', ubicacion:'marbella', tipo:'efectivo', nombre:'Efectivo Marbella' },
  { id:'tpv-marbella',      label:'💳 TPV Marbella', ubicacion:'marbella', tipo:'tpv',      nombre:'TPV Marbella' },
  { id:'efectivo-monda',    label:'💵 Ef. Monda',    ubicacion:'monda',    tipo:'efectivo', nombre:'Efectivo Monda' },
  { id:'tpv-monda',         label:'💳 TPV Monda',    ubicacion:'monda',    tipo:'tpv',      nombre:'TPV Monda' },
  { id:'transferencia',     label:'🏦 Transf.',      ubicacion:null,       tipo:'transferencia', nombre:'Transferencia Bancaria' },
  { id:'factura0',          label:'📄 Factura 0€',   ubicacion:null,       tipo:'otro',     nombre:'Factura 0€' },
];

let estadoActual = {};
let facturasActuales = [];
let noConfirmadosActuales = [];
let userInfo = null;
let sortCol = 'fecha_pago', sortDir = 1;

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin() {
  const usuario = document.getElementById('inp-usuario').value.trim();
  const password = document.getElementById('inp-pass').value;
  const r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario,password})});
  const d = await r.json();
  if (!r.ok) { document.getElementById('login-error').textContent = d.error||'Error'; return; }
  userInfo = d;
  iniciarApp();
}
document.getElementById('inp-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogout() { await fetch('/api/logout',{method:'POST'}); location.reload(); }

async function checkSession() {
  const r = await fetch('/api/me');
  if (!r.ok) return;
  userInfo = await r.json();
  iniciarApp();
}

function iniciarApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-nombre').textContent = userInfo.nombre;
  document.getElementById('user-avatar').textContent = userInfo.nombre[0].toUpperCase();
  if (['contabilidad','admin'].includes(userInfo.rol)) document.getElementById('tab-contabilidad').style.display='';
  const hoy = new Date().toISOString().substring(0,10);
  const primerDia = hoy.substring(0,8)+'01';
  document.getElementById('fecha-desde').value = localStorage.getItem('caja-desde')||primerDia;
  document.getElementById('fecha-hasta').value = localStorage.getItem('caja-hasta')||hoy;
  document.getElementById('contab-desde').value = primerDia;
  document.getElementById('contab-hasta').value = hoy;
}

function guardarFiltros() {
  localStorage.setItem('caja-desde', document.getElementById('fecha-desde').value);
  localStorage.setItem('caja-hasta', document.getElementById('fecha-hasta').value);
}

function showTab(tab) {
  ['caja','contabilidad'].forEach(t => {
    document.getElementById('panel-'+t).style.display = t===tab?'':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
}

// ── CARGAR COBROS ─────────────────────────────────────────────
async function cargarCobros() {
  const desde = document.getElementById('fecha-desde').value;
  const hasta = document.getElementById('fecha-hasta').value;
  if (!desde||!hasta) return;
  const btn = document.getElementById('btn-cargar');
  btn.disabled = true; btn.textContent = 'Cargando...';
  document.getElementById('caja-content').innerHTML = '<div class="loading"><div class="spinner"></div><p>Cargando facturas...</p></div>';
  document.getElementById('buscador').style.display = 'none';

  try {
    const [rF, rR, rC, rCrew] = await Promise.all([
      fetch(`${API_WORKER}/caja/facturas?desde=${desde}&hasta=${hasta}`).then(r=>r.json()),
      fetch(`/api/caja/registros?desde=${desde}&hasta=${hasta}`).then(r=>r.json()),
      fetch(`${API_WORKER}/contactos`).then(r=>r.json()),
      fetch(`${API_WORKER}/crew`).then(r=>r.json())
    ]);

    // Mapas
    const mapaContactos = {};
    (rC.data||[]).forEach(c => { mapaContactos[String(c.id)] = c.displayname||''; });
    const mapaCrew = {};
    (rCrew.data||[]).forEach(c => { mapaCrew[String(c.id)] = c.displayname||''; });

    const enrich = arr => arr.map(f => ({
      ...f,
      cliente: (f.cliente_id && mapaContactos[f.cliente_id]) ? mapaContactos[f.cliente_id] : (f.cliente||'—'),
      comercial: (f.comercial_id && mapaCrew[f.comercial_id]) ? mapaCrew[f.comercial_id] : ''
    }));

    facturasActuales = enrich(rF.facturas||[]);
    noConfirmadosActuales = enrich(rF.no_confirmados||[]);

    // Aplicar registros guardados
    estadoActual = {};
    Object.entries(rR||{}).forEach(([id,reg]) => { if(reg.metodo_pago) estadoActual[id] = reg.metodo_pago; });

    document.getElementById('buscador').style.display = '';
    renderCaja();
  } catch(e) {
    document.getElementById('caja-content').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error: ${e.message}</p></div>`;
  }
  btn.disabled = false; btn.innerHTML = '↻ Cargar cobros';
}

// ── FILTRAR + ORDENAR ────────────────────────────────────────
function getFacturasFiltradas() {
  const q = (document.getElementById('buscador')?.value||'').toLowerCase();
  let lista = facturasActuales.filter(f => {
    if (!q) return true;
    return (f.numero||'').toLowerCase().includes(q) ||
           (f.cliente||'').toLowerCase().includes(q) ||
           (f.comercial||'').toLowerCase().includes(q) ||
           (String(f.proyecto_numero)||'').includes(q);
  });
  lista.sort((a,b) => {
    let va = a[sortCol]||0, vb = b[sortCol]||0;
    if (typeof va==='string') return va.localeCompare(vb)*sortDir;
    return (va-vb)*sortDir;
  });
  return lista;
}

function filtrarTabla() { renderTablaFacturas(); }

function setSort(col) {
  if (sortCol===col) sortDir *= -1;
  else { sortCol=col; sortDir=1; }
  renderTablaFacturas();
}

function sortIcon(col) {
  if (sortCol!==col) return '<span class="sort-icon">↕</span>';
  return `<span class="sort-icon">${sortDir===1?'↑':'↓'}</span>`;
}

// ── RENDER CAJA ───────────────────────────────────────────────
function renderCaja() {
  const totales = {
    marbella:{efectivo:0,tpv:0,count_ef:0,count_tpv:0},
    monda:{efectivo:0,tpv:0,count_ef:0,count_tpv:0},
    transferencia:0
  };

  facturasActuales.forEach(f => {
    const mid = estadoActual[String(f.id)];
    if (!mid) return;
    const m = METODOS.find(x=>x.id===mid);
    if (!m) return;
    const imp = f.total_pagado||f.importe||0;
    if (m.ubicacion==='marbella') {
      totales.marbella[m.tipo]+=imp;
      m.tipo==='efectivo'?totales.marbella.count_ef++:totales.marbella.count_tpv++;
    } else if (m.ubicacion==='monda') {
      totales.monda[m.tipo]+=imp;
      m.tipo==='efectivo'?totales.monda.count_ef++:totales.monda.count_tpv++;
    } else if (m.tipo==='transferencia') totales.transferencia+=imp;
  });

  const totalMarb = totales.marbella.efectivo+totales.marbella.tpv;
  const totalMond = totales.monda.efectivo+totales.monda.tpv;
  const totalGlob = totalMarb+totalMond+totales.transferencia;
  const sinAsignar = facturasActuales.filter(f=>!estadoActual[String(f.id)]).length;

  document.getElementById('caja-content').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Total Cobrado</div><div class="kpi-value">${fmt(totalGlob)}</div><div class="kpi-sub">${facturasActuales.length} facturas · ${sinAsignar} sin asignar</div></div>
      <div class="kpi-card kpi-efectivo"><div class="kpi-label">Efectivo Total</div><div class="kpi-value">${fmt(totales.marbella.efectivo+totales.monda.efectivo)}</div><div class="kpi-sub">Marbella + Monda</div></div>
      <div class="kpi-card kpi-tpv"><div class="kpi-label">TPV Total</div><div class="kpi-value">${fmt(totales.marbella.tpv+totales.monda.tpv)}</div><div class="kpi-sub">Marbella + Monda</div></div>
      <div class="kpi-card kpi-transferencia"><div class="kpi-label">Transferencias</div><div class="kpi-value">${fmt(totales.transferencia)}</div><div class="kpi-sub">Bancarias</div></div>
    </div>

    <div class="cajas-grid">
      <div class="caja-card caja-marbella">
        <div class="caja-header"><div class="caja-title">🏙️ Caja Marbella</div><div class="caja-total">${fmt(totalMarb)}</div></div>
        <div class="caja-desglose">
          <div class="desglose-item efectivo"><div class="desglose-label">💵 Efectivo</div><div class="desglose-value">${fmt(totales.marbella.efectivo)}</div><div class="desglose-count">${totales.marbella.count_ef} cobros</div></div>
          <div class="desglose-item tpv"><div class="desglose-label">💳 TPV</div><div class="desglose-value">${fmt(totales.marbella.tpv)}</div><div class="desglose-count">${totales.marbella.count_tpv} cobros</div></div>
        </div>
        <div class="saldo-row"><label>Saldo inicial €</label><input type="number" class="saldo-input" id="saldo-marbella" value="0" min="0" oninput="actualizarEf('marbella',${totales.marbella.efectivo})"><button class="btn-retirada" onclick="registrarRetirada('marbella')">- Retirada</button></div>
        <div class="efectivo-total"><span>EFECTIVO EN CAJA</span><span id="ef-caja-marbella">${fmt(totales.marbella.efectivo)}</span></div>
      </div>
      <div class="caja-card caja-monda">
        <div class="caja-header"><div class="caja-title">🏡 Caja Monda</div><div class="caja-total">${fmt(totalMond)}</div></div>
        <div class="caja-desglose">
          <div class="desglose-item efectivo"><div class="desglose-label">💵 Efectivo</div><div class="desglose-value">${fmt(totales.monda.efectivo)}</div><div class="desglose-count">${totales.monda.count_ef} cobros</div></div>
          <div class="desglose-item tpv"><div class="desglose-label">💳 TPV</div><div class="desglose-value">${fmt(totales.monda.tpv)}</div><div class="desglose-count">${totales.monda.count_tpv} cobros</div></div>
        </div>
        <div class="saldo-row"><label>Saldo inicial €</label><input type="number" class="saldo-input" id="saldo-monda" value="0" min="0" oninput="actualizarEf('monda',${totales.monda.efectivo})"><button class="btn-retirada" onclick="registrarRetirada('monda')">- Retirada</button></div>
        <div class="efectivo-total"><span>EFECTIVO EN CAJA</span><span id="ef-caja-monda">${fmt(totales.monda.efectivo)}</span></div>
      </div>
    </div>

    <div class="cierres-row">
      <button class="btn-cierre btn-cierre-marbella" onclick="generarCierre('marbella')">🟣 Cierre Marbella</button>
      <button class="btn-cierre btn-cierre-monda" onclick="generarCierre('monda')">🟢 Cierre Monda</button>
      <button class="btn-cierre btn-cierre-noconf" onclick="generarCierre('noconfirmados')">🍾 No Confirmados</button>
      <button class="btn-cierre btn-cierre-global" onclick="generarCierre('global')">📋 Cierre Global</button>
    </div>

    <div id="tabla-facturas-wrapper"></div>
    <div id="tabla-noconf-wrapper"></div>
  `;

  renderTablaFacturas();
  renderTablaNoConf();
}

function renderTablaFacturas() {
  const lista = getFacturasFiltradas();
  const sinAsignar = lista.filter(f=>!estadoActual[String(f.id)]).length;

  const html = `
    <div class="tabla-section">
      <div class="tabla-header">
        <div class="tabla-title">🧾 Facturas Oficiales <span class="badge badge-gray">${lista.length}</span>${sinAsignar>0?`<span class="badge badge-orange">${sinAsignar} sin asignar</span>`:''}</div>
      </div>
      ${lista.length===0
        ? '<div class="empty-state"><div class="icon">📄</div><p>No hay facturas en este período</p></div>'
        : `<div class="tabla-scroll"><table>
          <thead><tr>
            <th onclick="setSort('numero')" class="${sortCol==='numero'?'sorted':''}">Nº Factura${sortIcon('numero')}</th>
            <th onclick="setSort('cliente')" class="${sortCol==='cliente'?'sorted':''}">Cliente${sortIcon('cliente')}</th>
            <th onclick="setSort('proyecto_numero')" class="${sortCol==='proyecto_numero'?'sorted':''}">Proyecto${sortIcon('proyecto_numero')}</th>
            <th onclick="setSort('comercial')" class="${sortCol==='comercial'?'sorted':''}">Comercial${sortIcon('comercial')}</th>
            <th onclick="setSort('fecha_pago')" class="${sortCol==='fecha_pago'?'sorted':''}">Fecha Pago${sortIcon('fecha_pago')}</th>
            <th onclick="setSort('total_pagado')" class="${sortCol==='total_pagado'?'sorted':''}">Importe${sortIcon('total_pagado')}</th>
            <th>Método de Pago</th>
          </tr></thead>
          <tbody>${lista.map(f=>renderFila(f,false)).join('')}</tbody>
        </table></div>`
      }
    </div>`;
  document.getElementById('tabla-facturas-wrapper').innerHTML = html;
}

function renderTablaNoConf() {
  if (!noConfirmadosActuales.length) { document.getElementById('tabla-noconf-wrapper').innerHTML=''; return; }
  const html = `
    <div class="tabla-section">
      <div class="tabla-header">
        <div class="tabla-title">🍾 No Confirmados <span class="badge badge-orange">${noConfirmadosActuales.length}</span></div>
      </div>
      <div class="tabla-scroll"><table>
        <thead><tr>
          <th>Nº Factura</th><th>Cliente</th><th>Proyecto</th><th>Comercial</th><th>Fecha Pago</th><th>Importe Base</th><th>Método de Pago</th>
        </tr></thead>
        <tbody>${noConfirmadosActuales.map(f=>renderFila(f,true)).join('')}</tbody>
      </table></div>
    </div>`;
  document.getElementById('tabla-noconf-wrapper').innerHTML = html;
}

function renderFila(f, esNoConf) {
  const mid = estadoActual[String(f.id)]||'';
  const m = METODOS.find(x=>x.id===mid);
  const imp = f.total_pagado||f.importe||0;
  const impHtml = imp>=0
    ? `<span class="importe pos">${fmt(imp)}</span>`
    : `<span class="importe neg">${fmt(imp)}</span>`;
  const botones = METODOS.map(met=>`<button class="btn-metodo ${mid===met.id?'sel-'+met.id:''}" onclick="asignarMetodo(${f.id},'${met.id}',${esNoConf})">${met.label}</button>`).join('');

  return `<tr id="fila-${f.id}">
    <td><strong>${f.numero||f.id}</strong></td>
    <td><div class="cliente-nombre">${f.cliente||'—'}</div></td>
    <td><span class="proyecto-num">${f.proyecto_numero||'—'}</span></td>
    <td>${f.comercial?`<span class="comercial-tag">${f.comercial}</span>`:''}</td>
    <td style="color:var(--gray)">${f.fecha_pago||'—'}</td>
    <td>${impHtml}</td>
    <td><div class="metodo-selector">${botones}</div></td>
  </tr>`;
}

async function asignarMetodo(facturaId, metodoId, esNoConf) {
  const key = String(facturaId);
  const anterior = estadoActual[key];
  if (anterior===metodoId) { delete estadoActual[key]; metodoId=null; }
  else estadoActual[key] = metodoId;

  const f = [...facturasActuales,...noConfirmadosActuales].find(x=>x.id===facturaId);
  const m = metodoId ? METODOS.find(x=>x.id===metodoId) : null;
  await fetch('/api/caja/registro',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    factura_id:facturaId, metodo_pago:metodoId,
    ubicacion:m?.ubicacion, tipo:m?.tipo,
    importe:f?.total_pagado||f?.importe||0,
    cliente:f?.cliente||'', numero:f?.numero||'',
    fecha_pago:f?.fecha_pago||'', es_abrebotellas:esNoConf,
    usuario:userInfo?.nombre||''
  })});
  renderCaja();
}

function actualizarEf(caja, efectivo) {
  const el = document.getElementById('saldo-'+caja);
  const out = document.getElementById('ef-caja-'+caja);
  if (el&&out) out.textContent = fmt(efectivo + (parseFloat(el.value)||0));
}

function registrarRetirada(caja) {
  const imp = prompt(`Retirada de Caja ${caja==='marbella'?'Marbella':'Monda'} (€):`);
  if (!imp||isNaN(parseFloat(imp))) return;
  alert(`✅ Retirada de ${fmt(parseFloat(imp))} registrada`);
}

// ── CIERRE ────────────────────────────────────────────────────
function generarCierre(tipo) {
  const desde = document.getElementById('fecha-desde').value;
  const hasta = document.getElementById('fecha-hasta').value;
  let titulo, lista;
  if (tipo==='marbella') { titulo='🟣 Cierre Caja Marbella'; lista=facturasActuales.filter(f=>{const m=METODOS.find(x=>x.id===estadoActual[String(f.id)]);return m?.ubicacion==='marbella';}); }
  else if (tipo==='monda') { titulo='🟢 Cierre Caja Monda'; lista=facturasActuales.filter(f=>{const m=METODOS.find(x=>x.id===estadoActual[String(f.id)]);return m?.ubicacion==='monda';}); }
  else if (tipo==='noconfirmados') { titulo='🍾 No Confirmados'; lista=noConfirmadosActuales.filter(f=>estadoActual[String(f.id)]); }
  else { titulo='📋 Cierre Global'; lista=facturasActuales.filter(f=>estadoActual[String(f.id)]); }

  let ef=0,tpv=0,tr=0;
  lista.forEach(f=>{
    const m=METODOS.find(x=>x.id===estadoActual[String(f.id)]);
    const imp=f.total_pagado||f.importe||0;
    if(m?.tipo==='efectivo')ef+=imp; else if(m?.tipo==='tpv')tpv+=imp; else if(m?.tipo==='transferencia')tr+=imp;
  });

  document.getElementById('modal-title').textContent = titulo;
  document.getElementById('modal-body').innerHTML = `
    <div class="cierre-empresa"><strong>ORUM Rent & Events</strong><p style="color:var(--gray);font-size:12px;margin-top:4px">${desde} al ${hasta}</p></div>
    <div class="cierre-linea"><span>💵 Efectivo</span><strong>${fmt(ef)}</strong></div>
    <div class="cierre-linea"><span>💳 TPV</span><strong>${fmt(tpv)}</strong></div>
    ${tr>0?`<div class="cierre-linea"><span>🏦 Transferencias</span><strong>${fmt(tr)}</strong></div>`:''}
    <div class="cierre-linea total"><span>TOTAL</span><strong>${fmt(ef+tpv+tr)}</strong></div>
    <div style="margin-top:16px;overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:var(--gray-bg)"><th style="padding:6px 10px;text-align:left">Factura</th><th style="padding:6px 10px;text-align:left">Cliente</th><th style="padding:6px 10px;text-align:left">Proyecto</th><th style="padding:6px 10px;text-align:right">Importe</th><th style="padding:6px 10px;text-align:left">Método</th></tr></thead>
        <tbody>${lista.map(f=>{const m=METODOS.find(x=>x.id===estadoActual[String(f.id)]);const imp=f.total_pagado||f.importe||0;return `<tr style="border-bottom:1px solid var(--gray-light)"><td style="padding:6px 10px">${f.numero||f.id}</td><td style="padding:6px 10px">${f.cliente||'—'}</td><td style="padding:6px 10px;color:var(--gray)">${f.proyecto_numero||'—'}</td><td style="padding:6px 10px;text-align:right;font-weight:600">${fmt(imp)}</td><td style="padding:6px 10px;color:var(--gray)">${m?.nombre||'—'}</td></tr>`;}).join('')}</tbody>
      </table>
    </div>
    <div class="cierre-firma"><label>Responsable de cierre</label><input type="text" id="firma-nombre" value="${userInfo?.nombre||''}"></div>
    <button class="btn-imprimir" onclick="imprimirCierre('${titulo}')">🖨️ Imprimir / PDF</button>`;
  document.getElementById('modal-cierre').style.display='flex';
}

function cerrarModal() { document.getElementById('modal-cierre').style.display='none'; }

function imprimirCierre(titulo) {
  const firma = document.getElementById('firma-nombre')?.value||'';
  const contenido = document.getElementById('modal-body').innerHTML;
  const w = window.open('','_blank');
  w.document.write(`<html><head><title>${titulo}</title><style>body{font-family:sans-serif;padding:32px;max-width:600px;margin:0 auto}table{width:100%;border-collapse:collapse}th,td{padding:6px 10px;border-bottom:1px solid #eee}.btn-imprimir{display:none}.cierre-firma input{border:none;border-bottom:1px solid #333;width:100%}</style></head><body><h2>${titulo}</h2>${contenido}<p style="margin-top:24px;font-size:12px;color:#666">Firmado: ${firma} · ${new Date().toLocaleString('es-ES')}</p><script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}

// ── CONTABILIDAD ──────────────────────────────────────────────
async function cargarContabilidad() {
  const desde = document.getElementById('contab-desde').value;
  const hasta = document.getElementById('contab-hasta').value;
  if (!desde||!hasta) return;
  document.getElementById('contab-content').innerHTML='<div class="loading"><div class="spinner"></div><p>Cargando...</p></div>';
  try {
    const [rF,rR,rT] = await Promise.all([
      fetch(`${API_WORKER}/caja/facturas?desde=${desde}&hasta=${hasta}`).then(r=>r.json()),
      fetch(`/api/caja/registros?desde=${desde}&hasta=${hasta}`).then(r=>r.json()),
      fetch(`/api/ticks?desde=${desde}&hasta=${hasta}`).then(r=>r.json())
    ]);
    const facturas = [...(rF.facturas||[]),...(rF.no_confirmados||[])];
    const registros=rR||{}, ticks=rT||{};
    document.getElementById('contab-content').innerHTML=`
      <div class="tabla-section">
        <div class="tabla-header"><div class="tabla-title">📊 Facturas — Contabilidad</div></div>
        ${facturas.length===0?'<div class="empty-state"><p>No hay facturas</p></div>':`
        <div class="tabla-scroll"><table>
          <thead><tr><th>Nº Factura</th><th>Cliente</th><th>Fecha Pago</th><th>Importe</th><th>Método</th><th>No Conf.</th><th>Verificado</th></tr></thead>
          <tbody>${facturas.map(f=>{
            const reg=registros[String(f.id)];
            const tick=ticks[`${f.fecha_pago}_${f.id}`];
            const m=reg?METODOS.find(x=>x.id===reg.metodo_pago):null;
            const imp=f.total_pagado||f.importe||0;
            return `<tr><td><strong>${f.numero||f.id}</strong></td><td>${f.cliente||'—'}</td><td style="color:var(--gray)">${f.fecha_pago||'—'}</td><td><strong>${fmt(imp)}</strong></td><td style="color:var(--gray);font-size:12px">${m?.nombre||'—'}</td><td style="text-align:center">${f.es_abrebotellas?'🍾':''}</td><td style="text-align:center"><div class="tick-circle ${tick?'checked':''}" onclick="toggleTick('${f.fecha_pago}_${f.id}',this)">${tick?'✓':''}</div></td></tr>`;
          }).join('')}</tbody>
        </table></div>`}
      </div>`;
  } catch(e) { document.getElementById('contab-content').innerHTML=`<div class="empty-state"><p>Error: ${e.message}</p></div>`; }
}

async function toggleTick(key, el) {
  const checked = el.classList.contains('checked');
  const r = await fetch('/api/tick',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,valor:checked?null:true,usuario:userInfo?.nombre||''})});
  if (r.ok) { el.classList.toggle('checked'); el.textContent=el.classList.contains('checked')?'✓':''; }
}

function fmt(n) { return (parseFloat(n)||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }

checkSession();
</script>
